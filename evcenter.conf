# rename this file to evcenter.yml and put a ':' after 'name' if
# you want to use YAML like in old versions of Catalyst
name EVCenter

<Plugin::SmartURI>
    disposition relative   # application-wide
    uri_class   URI::SmartURI # by default
</Plugin::SmartURI>

<Model::Processor>
    <args>
        includes lib/EVCenter/Includes
    </args>
</Model::Processor>

<Model::Event>
    <args>
        dbhost localhost
        dbname evcenter
        dbuser evcenter
        dbpass change_me
        dbport 5432
        dbopts ""
        <dbi_opts>
            AutoCommit 1
        </dbi_opts>
    </args>
</Model::Event>

<Model::ACL>
    <args>
        dbhost localhost
        dbname evcenter
        dbuser evcenter
        dbpass change_me
        dbport 5432
        dbopts ""
        <dbi_opts>
            AutoCommit 1
        </dbi_opts>
    </args>
</Model::ACL>

<Model::UserControl>
    <args>
        dbhost localhost
        dbname evcenter
        dbuser evcenter
        dbpass change_me
        dbport 5432
        dbopts ""
        <dbi_opts>
            AutoCommit 1
        </dbi_opts>
    </args>
</Model::UserControl>